task: optimize
run_name: ars_cn_ppi_line_m20000_lam1p0em2_s100_r100_t100_seed0
seed: 0

problem:
  type: multilabel_logistic
  source: data/generated/candidate_multilabel/ppi_line_m20000_lam1p0em2.npz

initialization:
  type: zeros

optimizer:
  type: ars_cn
  max_iter: 1000
  tol: 1.0e-5
  stop_on_grad_norm_stagnation: true
  grad_norm_stagnation_patience: 50
  grad_norm_stagnation_rtol: 1.0e-12
  grad_norm_stagnation_atol: 1.0e-12
  seed: 0
  subspace_dim: 100
  sigma0: 1.0
  sigma_min: 1.0e-8
  sigma_max: 1.0e8
  eta1: 0.05
  eta2: 0.9
  gamma1: 1.5
  gamma2: 2.0
  solver: lanczos
  exact_tol: 1.0e-10
  krylov_tol: 1.0e-8
  solve_each_i_th_krylov_space: 1
  keep_Q_matrix_in_memory: false
  verbose: true
  print_every: 10
  sketch:
    mode: operator
    block_size: 512
    dtype: float64
  rk:
    mode: default
    T: 100
    r: 100
    seed_offset: 0

log:
  enabled: true
  csv_path: output/results/candidate_multilabel/ars_cn_ppi_line_m20000_lam1p0em2_s100_r100_t100_seed0/ars_cn_ppi_line_m20000_lam1p0em2_s100_r100_t100_seed0.csv
  save_everytime: true

save_meta:
  enabled: true
  meta_path: output/results/candidate_multilabel/ars_cn_ppi_line_m20000_lam1p0em2_s100_r100_t100_seed0/ars_cn_ppi_line_m20000_lam1p0em2_s100_r100_t100_seed0.json
  resolved_config_path: output/results/candidate_multilabel/ars_cn_ppi_line_m20000_lam1p0em2_s100_r100_t100_seed0/ars_cn_ppi_line_m20000_lam1p0em2_s100_r100_t100_seed0.resolved.yml
