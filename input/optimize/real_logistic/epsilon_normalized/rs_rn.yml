task: optimize
run_name: rs_rn_epsilon_normalized
seed: 0
problem:
  type: logistic
  source: data/generated/real_logistic/epsilon_normalized.npz
initialization:
  type: zeros
optimizer:
  type: rs_rn
  max_iter: 10000
  tol: 1.0e-08
  stop_on_grad_norm_stagnation: true
  grad_norm_stagnation_rtol: 1.0e-12
  seed: 0
  subspace_dim: 100
  verbose: true
  print_every: 20
  sketch:
    mode: operator
    block_size: 512
    dtype: float64
  diag_shift:
    c1: 2.0
    c2: 1.0
    gamma: 0.5
  line_search:
    enabled: true
    alpha0: 1.0
    c1: 1.0e-04
    beta: 0.5
    max_iter: 25
log:
  enabled: true
  csv_path: output/results/rs_rn_epsilon_normalized.csv
  save_everytime: true
save_meta:
  enabled: true
  meta_path: output/meta/rs_rn_epsilon_normalized.json
  resolved_config_path: output/meta/rs_rn_epsilon_normalized.resolved.yml
