task: optimize
run_name: gd_blogcatalog_strongly_convex
seed: 0

problem:
  type: multilabel_logistic
  source: data/generated/real_strongly_convex/blogcatalog_multilabel_l2_m10312.npz

initialization:
  type: zeros

optimizer:
  type: gd
  max_iter: 100000
  tol: 1.0e-5
  verbose: true
  print_every: 1000
  line_search:
    enabled: true
    alpha0: 1.0
    c1: 1.0e-4
    beta: 0.5
    max_iter: 25
log:
  enabled: true
  csv_path: output/results/gd_blogcatalog_strongly_convex.csv
  save_everytime: true

save_meta:
  enabled: true
  meta_path: output/meta/gd_blogcatalog_strongly_convex.json
  resolved_config_path: output/meta/gd_blogcatalog_strongly_convex.resolved.yml
