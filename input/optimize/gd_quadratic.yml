task: optimize
run_name: gd_quadratic
seed: 0

problem:
  type: quadratic
  dim: 64
  spectrum: exponential
  lambda_max: 1.0
  lambda_min: 1.0e-6
  b_norm: 1.0
  seed: 0

initialization:
  type: zeros

optimizer:
  type: gd
  max_iter: 100000
  tol: 1.0e-8
  verbose: true
  print_every: 1000
  line_search:
    enabled: true
    c1: 1.0e-4
    beta: 0.5
    alpha0: 1.0
    max_iter: 25

log:
  enabled: true
  csv_path: output/results/gd_quadratic.csv
  save_everytime: true

save_meta:
  enabled: true
  meta_path: output/meta/gd_quadratic.json
  resolved_config_path: output/meta/gd_quadratic.resolved.yml
