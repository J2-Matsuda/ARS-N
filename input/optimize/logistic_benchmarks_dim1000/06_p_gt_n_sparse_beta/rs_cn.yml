task: optimize
run_name: rs_cn_logistic_p_gt_n_sparse_beta
seed: 0
problem:
  type: logistic
  source: data/generated/logistic_benchmarks_dim1000/logistic_p_gt_n_sparse_beta.npz
initialization:
  type: zeros
optimizer:
  type: rs_cn
  max_iter: 1000000
  tol: 1.0e-08
  stop_on_grad_norm_stagnation: true
  grad_norm_stagnation_rtol: 1.0e-12
  seed: 0
  subspace_dim: 50
  sigma0: 1.0
  sigma_min: 1.0e-08
  sigma_max: 1.0e+08
  eta1: 0.05
  eta2: 0.9
  gamma1: 1.5
  gamma2: 2.0
  solver: lanczos
  exact_tol: 1.0e-12
  krylov_tol: 1.0e-08
  solve_each_i_th_krylov_space: 1
  keep_Q_matrix_in_memory: false
  verbose: true
  print_every: 10
  sketch:
    mode: operator
    block_size: 256
    dtype: float64
log:
  enabled: true
  csv_path: output/results/rs_cn_logistic_p_gt_n_sparse_beta.csv
  save_everytime: true
save_meta:
  enabled: true
  meta_path: output/meta/rs_cn_logistic_p_gt_n_sparse_beta.json
  resolved_config_path: output/meta/rs_cn_logistic_p_gt_n_sparse_beta.resolved.yml
