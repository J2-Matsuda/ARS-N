task: optimize
run_name: gd_unfair_reg0_mfull
seed: 0

problem:
  type: mlp_multilabel_logistic
  source: data/generated/real_nonconvex/unfair_tos_mlp_multilabel_h1_m5532.npz

initialization:
  type: random_normal
  scale: 1.0e-2
optimizer:
  type: gd
  max_iter: 100000
  tol: 1.0e-5
  verbose: true
  print_every: 1000
  line_search:
    enabled: true
    alpha0: 1.0
    c1: 1.0e-4
    beta: 0.5
    max_iter: 25
log:
  enabled: true
  csv_path: output/results/gd_unfair_reg0_mfull/gd_unfair_reg0_mfull.csv
  save_everytime: true

save_meta:
  enabled: true
  meta_path: output/meta/gd_unfair_reg0_mfull.json
  resolved_config_path: output/meta/gd_unfair_reg0_mfull.resolved.yml
