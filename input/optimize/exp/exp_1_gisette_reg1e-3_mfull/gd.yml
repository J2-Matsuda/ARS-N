task: optimize
run_name: gd_gisette_reg1e-3_mfull
seed: 0

problem:
  type: logistic
  source: data/generated/exp/gisette_reg1e-3_mfull.npz

initialization:
  type: zeros
optimizer:
  type: gd
  max_iter: 100000
  tol: 1.0e-5
  verbose: true
  print_every: 1000
  line_search:
    enabled: true
    alpha0: 1.0
    c1: 1.0e-4
    beta: 0.5
    max_iter: 25
log:
  enabled: true
  csv_path: output/results/gd_gisette_reg1e-3_mfull/gd_gisette_reg1e-3_mfull.csv
  save_everytime: true

save_meta:
  enabled: true
  meta_path: output/meta/gd_gisette_reg1e-3_mfull.json
  resolved_config_path: output/meta/gd_gisette_reg1e-3_mfull.resolved.yml
