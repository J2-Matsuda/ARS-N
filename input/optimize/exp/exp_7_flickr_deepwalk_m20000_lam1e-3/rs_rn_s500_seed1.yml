task: optimize
run_name: rs_rn_flickr_deepwalk_m20000_lam1e-3_s500_seed1
seed: 1
problem:
  type: multilabel_logistic
  source: data/generated/exp/flickr_deepwalk_m20000_lam1e-3.npz
initialization:
  type: zeros
optimizer:
  type: rs_rn
  max_iter: 1000000
  tol: 1.0e-05
  stop_on_grad_norm_stagnation: true
  grad_norm_stagnation_patience: 50
  grad_norm_stagnation_rtol: 1.0e-12
  grad_norm_stagnation_atol: 1.0e-12
  seed: 1
  subspace_dim: 500
  verbose: true
  print_every: 20
  sketch:
    mode: operator
    block_size: 512
    dtype: float64
  diag_shift:
    c1: 2.0
    c2: 1.0
    gamma: 0.5
  line_search:
    enabled: true
    alpha0: 1.0
    c1: 0.0001
    beta: 0.5
    max_iter: 25
log:
  enabled: true
  csv_path: output/results/rs_rn_flickr_deepwalk_m20000_lam1e-3_s500_seed1/rs_rn_flickr_deepwalk_m20000_lam1e-3_s500_seed1.csv
  save_everytime: true
save_meta:
  enabled: true
  meta_path: output/meta/rs_rn_flickr_deepwalk_m20000_lam1e-3_s500_seed1.json
  resolved_config_path: output/meta/rs_rn_flickr_deepwalk_m20000_lam1e-3_s500_seed1.resolved.yml
