task: optimize
run_name: rs_cn_usps_reg0_mfull_s100_seed2
seed: 2

problem:
  type: softmax
  source: data/generated/real_noreg_convex/usps_noreg.npz

initialization:
  type: zeros
optimizer:
  type: rs_cn
  max_iter: 10000
  tol: 1.0e-5
  stop_on_grad_norm_stagnation: true
  grad_norm_stagnation_patience: 50
  grad_norm_stagnation_rtol: 1.0e-12
  grad_norm_stagnation_atol: 1.0e-12
  seed: 2
  subspace_dim: 100
  sigma0: 1.0
  sigma_min: 1.0e-8
  sigma_max: 1.0e8
  eta1: 0.05
  eta2: 0.9
  gamma1: 1.5
  gamma2: 2.0
  solver: lanczos
  exact_tol: 1.0e-12
  krylov_tol: 1.0e-8
  solve_each_i_th_krylov_space: 1
  keep_Q_matrix_in_memory: false
  verbose: true
  print_every: 10
  sketch:
    mode: operator
    block_size: 512
    dtype: float64
log:
  enabled: true
  csv_path: output/results/rs_cn_usps_reg0_mfull_s100_seed2/rs_cn_usps_reg0_mfull_s100_seed2.csv
  save_everytime: true

save_meta:
  enabled: true
  meta_path: output/meta/rs_cn_usps_reg0_mfull_s100_seed2.json
  resolved_config_path: output/meta/rs_cn_usps_reg0_mfull_s100_seed2.resolved.yml
