task: optimize
run_name: gd_flickr_deepwalk_m20000_lam0_seed1
seed: 1
problem:
  type: multilabel_logistic
  source: data/generated/exp/flickr_deepwalk_m20000_lam0.npz
initialization:
  type: zeros
optimizer:
  type: gd
  max_iter: 100000
  tol: 1.0e-05
  verbose: true
  print_every: 1000
  line_search:
    enabled: true
    alpha0: 1.0
    c1: 0.0001
    beta: 0.5
    max_iter: 25
log:
  enabled: true
  csv_path: output/results/gd_flickr_deepwalk_m20000_lam0_seed1/gd_flickr_deepwalk_m20000_lam0_seed1.csv
  save_everytime: true
save_meta:
  enabled: true
  meta_path: output/meta/gd_flickr_deepwalk_m20000_lam0_seed1.json
  resolved_config_path: output/meta/gd_flickr_deepwalk_m20000_lam0_seed1.resolved.yml
