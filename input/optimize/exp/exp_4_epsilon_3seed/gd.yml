task: optimize
run_name: gd_exp_4_epsilon_3seed
seed: 0
problem:
  type: logistic
  source: data/generated/real_noreg_convex/epsilon_noreg.npz
initialization:
  type: zeros
optimizer:
  type: gd
  max_iter: 10000000
  tol: 1.0e-05
  verbose: true
  print_every: 1000
  line_search:
    enabled: true
    alpha0: 1.0
    c1: 0.0001
    beta: 0.5
    max_iter: 25
log:
  enabled: true
  csv_path: output/results/gd_exp_4_epsilon_3seed.csv
  save_everytime: true
save_meta:
  enabled: true
  meta_path: output/meta/gd_exp_4_epsilon_3seed.json
  resolved_config_path: output/meta/gd_exp_4_epsilon_3seed.resolved.yml
