  n_features: 47236
  index_base: 1
  reg_lambda: 1.0e-3
  # For a quick loader smoke test, temporarily enable e.g. max_rows: 10000
  # max_rows: 10000

save:
  path: data/generated/real_logistic/rcv1_binary.npz
