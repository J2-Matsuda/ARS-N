task: generate_data
run_name: epsilon_logistic_l2_m10000
seed: 0

problem:
  type: logistic
  source_format: libsvm
  raw_source: data/raw/libsvm/epsilon_normalized.bz2
  download_if_missing: true
  download_if_corrupt: true
  download_url: https://www.csie.ntu.edu.tw/~cjlin/libsvmtools/datasets/binary/epsilon_normalized.bz2
  n_features: 2000
  index_base: 1
  add_bias: true
  reg_lambda: 1.0e-3
  regularize_bias: true
  sample_size: 10000
  sample_seed: 0

save:
  path: data/generated/real_strongly_convex/epsilon_logistic_l2_m10000.npz
