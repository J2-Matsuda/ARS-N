task: plot
plot_name: logistic_n10000

inputs:
  - path: output/results/ars_cn_logistic_n10000.csv
    label: ARS-CN
    color: red
    linestyle: solid
  - path: output/results/rs_cn_logistic_n10000.csv
    label: RS-CN
    color: red
    linestyle: dashed
  - path: output/results/cn_arc_logistic_n10000.csv
    label: CN
    color: red
    linestyle: dashdot

plot:
  x: cumulative_time
  y: grad_norm
  xscale: linear
  yscale: log
  title: "Logistic n10000"
  xlabel: cumulative_time
  ylabel: grad_norm
  grid: true

save:
  path: output/plots/logistic_n10000.png
