task: plot
plot_name: rs-cn-log-n1000

inputs:
  - path: output/results/ars_cn_logistic_n1000.csv
    label: ARS-CN
    color: "#0b7285"
    linestyle: solid
  - path: output/results/rs_cn_logistic_n1000.csv
    label: RS-CN
    color: "#d9480f"
    linestyle: dashed
  - path: output/results/ars_rn_logistic_n1000.csv
    label: ARS-RN
    color: "#2b8a3e"
    linestyle: solid
  - path: output/results/rs_rn_logistic_n1000.csv
    label: RS-RN
    color: "#5f3dc4"
    linestyle: dashed

plot:
  x: cumulative_time
  # x: iter
  y: grad_norm
  xscale: linear
  yscale: log
  title: "Logistic: grad_norm vs cumulative_time"
  xlabel: cumulative_time
  ylabel: grad_norm
  grid: true

save:
  path: output/plots/logistic_n1000.png
