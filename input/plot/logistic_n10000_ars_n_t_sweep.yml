task: plot
plot_name: logistic_n10000_ars_n_t_sweep

inputs:
  - path: output/results/rs_cn_logistic_n10000/rs_cn_logistic_n10000.csv
    label: RS-CN
    color: red
    linestyle: dashed
  - path: output/results/cn_arc_logistic_n10000/cn_arc_logistic_n10000.csv
    label: CN
    color: red
    linestyle: dashdot
  - path: output/results/ars_cn_logistic_n10000_t10/ars_cn_logistic_n10000_t10.csv
    label: "ARS-CN T=10"
    color: "#d9480f"
    linestyle: solid
  - path: output/results/ars_cn_logistic_n10000_t50/ars_cn_logistic_n10000_t50.csv
    label: "ARS-CN T=50"
    color: "#e67700"
    linestyle: dashed
  - path: output/results/ars_cn_logistic_n10000_t100/ars_cn_logistic_n10000_t100.csv
    label: "ARS-CN T=100"
    color: "#fab005"
    linestyle: dotted
  - path: output/results/ars_cn_logistic_n10000_t200/ars_cn_logistic_n10000_t200.csv
    label: "ARS-CN T=200"
    color: "#2b8a3e"
    linestyle: dashdot
  - path: output/results/ars_cn_logistic_n10000_t300/ars_cn_logistic_n10000_t300.csv
    label: "ARS-CN T=300"
    color: "#1971c2"
    linestyle: solid
  - path: output/results/ars_cn_logistic_n10000_t500/ars_cn_logistic_n10000_t500.csv
    label: "ARS-CN T=500"
    color: "#5f3dc4"
    linestyle: dashed
  - path: output/results/rs_rn_logistic_n10000/rs_rn_logistic_n10000.csv
    label: RS-RN
    color: blue
    linestyle: dashed
  - path: output/results/rn_logistic_n10000/rn_logistic_n10000.csv
    label: RN
    color: blue
    linestyle: dashdot
  - path: output/results/ars_rn_logistic_n10000_t10/ars_rn_logistic_n10000_t10.csv
    label: "ARS-RN T=10"
    color: "#d9480f"
    linestyle: solid
  - path: output/results/ars_rn_logistic_n10000_t50/ars_rn_logistic_n10000_t50.csv
    label: "ARS-RN T=50"
    color: "#e67700"
    linestyle: dashed
  - path: output/results/ars_rn_logistic_n10000_t100/ars_rn_logistic_n10000_t100.csv
    label: "ARS-RN T=100"
    color: "#fab005"
    linestyle: dotted
  - path: output/results/ars_rn_logistic_n10000_t200/ars_rn_logistic_n10000_t200.csv
    label: "ARS-RN T=200"
    color: "#2b8a3e"
    linestyle: dashdot
  - path: output/results/ars_rn_logistic_n10000_t300/ars_rn_logistic_n10000_t300.csv
    label: "ARS-RN T=300"
    color: "#1971c2"
    linestyle: solid
  - path: output/results/ars_rn_logistic_n10000_t500/ars_rn_logistic_n10000_t500.csv
    label: "ARS-RN T=500"
    color: "#5f3dc4"
    linestyle: dashed

plot:
  x: cumulative_time
  y: grad_norm
  xscale: linear
  yscale: log
  title: "logistic n10000: ARS-CN / ARS-RN T sweep"
  xlabel: cumulative_time
  ylabel: grad_norm
  grid: true

save:
  path: output/plots/logistic_n10000_ars_n_t_sweep.png
