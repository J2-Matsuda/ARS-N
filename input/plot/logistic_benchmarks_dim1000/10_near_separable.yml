task: plot
plot_name: 10_near_separable

inputs:
  - path: output/results/ars_cn_logistic_near_separable/ars_cn_logistic_near_separable.csv
    label: ARS-CN
    color: red
    linestyle: solid
  - path: output/results/rs_cn_logistic_near_separable/rs_cn_logistic_near_separable.csv
    label: RS-CN
    color: red
    linestyle: dashed
  - path: output/results/cn_arc_logistic_near_separable/cn_arc_logistic_near_separable.csv
    label: CN-ARC
    color: red
    linestyle: dashdot
  - path: output/results/ars_rn_logistic_near_separable/ars_rn_logistic_near_separable.csv
    label: ARS-RN
    color: blue
    linestyle: solid
  - path: output/results/rs_rn_logistic_near_separable/rs_rn_logistic_near_separable.csv
    label: RS-RN
    color: blue
    linestyle: dashed
  - path: output/results/rn_logistic_near_separable/rn_logistic_near_separable.csv
    label: RN
    color: blue
    linestyle: dashdot

plot:
  x: cumulative_time
  y: grad_norm
  xscale: linear
  yscale: log
  title: "Near Separable"
  xlabel: cumulative_time
  ylabel: grad_norm
  grid: true

save:
  path: output/plots/logistic_benchmarks_dim1000/10_near_separable.png
