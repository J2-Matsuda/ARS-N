task: plot
plot_name: logistic_n2000

inputs:
  - path: output/results/ars_cn_logistic_n2000.csv
    label: ARS-CN
    color: red
    linestyle: solid
  - path: output/results/rs_cn_logistic_n2000.csv
    label: RS-CN
    color: red
    linestyle: dashed
  - path: output/results/cn_arc_logistic_n2000.csv
    label: CN
    color: red
    linestyle: dashdot
  - path: output/results/ars_rn_logistic_n2000.csv
    label: ARS-RN
    color: blue
    linestyle: solid
  - path: output/results/rs_rn_logistic_n2000.csv
    label: RS-RN
    color: blue
    linestyle: dashed
  - path: output/results/rn_logistic_n2000.csv
    label: RN
    color: blue
    linestyle: dashdot

plot:
  x: cumulative_time
  y: grad_norm
  xscale: linear
  yscale: log
  title: "Logistic n2000"
  xlabel: cumulative_time
  ylabel: grad_norm
  grid: true

save:
  path: output/plots/logistic_n2000.png
